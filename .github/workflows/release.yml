name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            platform: darwin-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            platform: darwin-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Validate version consistency
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          CARGO_VER=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          NPM_VER=$(node -p "require('./npm/package.json').version")
          echo "Tag: $TAG, Cargo: $CARGO_VER, npm: $NPM_VER"
          if [ "$TAG" != "$CARGO_VER" ] || [ "$TAG" != "$NPM_VER" ]; then
            echo "::error::Version mismatch! tag=$TAG cargo=$CARGO_VER npm=$NPM_VER"
            exit 1
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binaries
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binaries
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/yessir dist/
          cp target/${{ matrix.target }}/release/yessir-hook dist/
          cd dist
          tar -czf ../yessir-${{ matrix.platform }}.tar.gz yessir yessir-hook

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: yessir-${{ matrix.platform }}
          path: yessir-${{ matrix.platform }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum */yessir-*.tar.gz | sed 's|.*/||' > ../checksums.txt
          cat ../checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*/yessir-*.tar.gz
            checksums.txt
          generate_release_notes: true

  publish-npm:
    needs: release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verify package version matches tag
        working-directory: npm
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          NPM_VER=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$NPM_VER" ]; then
            echo "::error::npm version $NPM_VER does not match tag $TAG"
            exit 1
          fi

      - name: Publish to npm
        working-directory: npm
        run: npm publish --access public --provenance
